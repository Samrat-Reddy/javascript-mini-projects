<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Rock, Paper, Scissors</title>
        <meta charset="UTF-8">
    </head>

    <body>
        <h1>Rock, Paper, Scissors</h1>

        <button onClick="playGame('rock')">Rock</button>
        <button onClick="playGame('paper')">Paper</button>
        <button onClick="playGame('scissors')">Scissors</button>

        <button onClick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        alert('Score reset');
        ">Reset Score</button>

        <script>
            let score = {
                wins: 0,
                losses: 0,
                ties: 0,
            };

            function getComputerChoice() {
                const randomNumber = Math.random();
                if (randomNumber >= 0 && randomNumber < 1/3) {
                    return 'rock';
                } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
                    return 'paper';
                } else {
                    return 'scissors';
                }
            }

            function playGame(playerMove) {
                const computerMove = getComputerChoice();
                let result = '';

                if (playerMove === "rock") {
                    if (computerMove === "rock") {
                        result = "tie";
                    } else if (computerMove === "paper") {
                        result = "lose";
                    } else {
                        result = "win";
                    }
                } else if (playerMove === "paper") {
                    if (computerMove === "rock") {
                        result = "win";
                    } else if (computerMove === "paper") {
                        result = "tie";
                    } else {
                        result = "lose";
                    }
                } else { // playerMove === "scissors"
                    if (computerMove === "rock") {
                        result = "lose";
                    } else if (computerMove === "paper") {
                        result = "win";
                    } else {
                        result = "tie";
                    }
                }

                if (result === "win") {
                    score.wins++;
                } else if (result === "lose") {
                    score.losses++;
                } else {
                    score.ties++;
                }

                alert(`You picked ${playerMove}, and computer picked ${computerMove}. Result: ${result}\nScore: ${score.wins} wins, ${score.losses} losses, ${score.ties} ties`);
            }
        </script>
    </body>
</html>
